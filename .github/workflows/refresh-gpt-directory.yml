name: Refresh GPT Directory

on:
  workflow_dispatch:
  schedule:
    - cron: "20 10 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Discover missing GPT URLs
        continue-on-error: true
        env:
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          BING_SEARCH_API_KEY: ${{ secrets.BING_SEARCH_API_KEY }}
          BING_SEARCH_ENDPOINT: ${{ secrets.BING_SEARCH_ENDPOINT }}
        run: npm run gpts:discover-urls

      - name: Validate public GPT links
        run: npm run gpts:validate-links

      - name: Refresh public listing metadata
        run: npm run gpts:refresh-metadata

      - name: Generate local avatar placeholders
        run: npm run gpts:generate-placeholders

      - name: Rebuild GPT indexes
        run: npm run gpts:build-index

      - name: Validate production build
        run: npm run build

      - name: Open refresh pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: automation/refresh-gpt-directory
          delete-branch: true
          commit-message: "chore: refresh GPT directory"
          title: "Refresh GPT directory"
          body: |
            Automated weekly refresh of:
            - GPT URL discovery
            - Link availability
            - Public listing metadata
            - Local avatar placeholders
            - Directory indexes and search data

            Review all changes before merging.
          labels: |
            automation
            gpt-directory
