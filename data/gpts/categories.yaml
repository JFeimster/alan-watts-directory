  - id: first-person-simulations
    label: First-Person Simulations
    route: /gpts/first-person-simulations/
    description: GPTs that present themselves as speaking as, embodying, or simulating Alan Watts.
  - id: multilingual
    label: Multilingual
    route: /gpts/multilingual/
    description: GPTs whose public listing explicitly supports languages beyond English.
  - id: creator-verified
    label: Creator Verified
    route: /gpts/creator-verified/
    description: Listings claimed and verified by their creators through the directory workflow.
classification:
  method: deterministic-keyword-seeding
  status: editorial-review-required
  allowMultipleCategories: true
